<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --font-sans: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            --color-bg-base: #0d0e14;
            --color-accent: #a855f7;
            --color-text-primary: #e2e8f0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-sans);
        }

        .ld-card {
            width: 340px;
            background: #0f1017;
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 16px;
            padding: 28px 24px 22px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(168, 85, 247, 0.08);
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: relative;
            overflow: hidden;
            animation: ld-slide-in 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .ld-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #4f46e5, #a855f7, #22d3ee);
        }

        .ld-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ld-header-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .ld-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #e2e8f0;
        }

        .ld-subtitle {
            font-size: 11px;
            color: #475569;
            letter-spacing: 0.04em;
            font-weight: 400;
        }

        .ld-spinner-wrap {
            position: relative;
            width: 70px;
            height: 70px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ld-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #a855f7;
            border-right-color: #22d3ee;
            animation: ld-spin 1.2s linear infinite;
        }

        .ld-eye-img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            animation: ld-pulse 2.5s ease-in-out infinite;
        }

        .ld-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ld-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #a855f7;
            animation: ld-dot-pulse 1s ease-in-out infinite;
        }

        .ld-status-text {
            font-family: var(--font-mono);
            font-size: 12px;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ld-progress-track {
            height: 2px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 1px;
            overflow: hidden;
        }

        .ld-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #a855f7, #22d3ee);
            border-radius: 1px;
            animation: ld-indeterminate 1.6s ease-in-out infinite;
        }

        @keyframes ld-slide-in {
            from { opacity: 0; transform: scale(0.88) translateY(12px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes ld-spin { to { transform: rotate(360deg); } }
        @keyframes ld-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes ld-dot-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.75); } }
        @keyframes ld-indeterminate { 0% { margin-left: -100%; width: 60%; } 50% { margin-left: 60%; width: 40%; } 100% { margin-left: 120%; width: 60%; } }
    </style>
</head>
<body>
    <div class="ld-card">
        <div class="ld-header">
            <div class="ld-spinner-wrap">
                <div class="ld-ring"></div>
                <img src="../../GUI Resources/the Eye AI agent transparent.png" class="ld-eye-img">
            </div>
            <div class="ld-header-text">
                <span class="ld-title">EYE</span>
                <span class="ld-subtitle">Forensic Assistant</span>
            </div>
        </div>
        <div class="ld-status">
            <span class="ld-status-dot"></span>
            <span id="status-text" class="ld-status-text">Initializing EYE AI Assistant...</span>
        </div>
        <div class="ld-progress-track">
            <div class="ld-progress-bar"></div>
        </div>
    </div>

    <script>
        const steps = [
            'Initializing EYE engine...',
            'Connecting to Python bridge...',
            'Loading forensic context...',
            'Opening case databases...',
            'Synthesizing workspace...'
        ];
        let i = 0;
        const el = document.getElementById('status-text');
        setInterval(() => {
            i = (i + 1) % steps.length;
            el.textContent = steps[i];
        }, 1200);
    </script>
</body>
</html>
